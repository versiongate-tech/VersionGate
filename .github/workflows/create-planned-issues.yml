name: Create Planned Issues

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/create-planned-issues.yml'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (print issues without creating them)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  issues: write
  contents: read

jobs:
  create-labels:
    name: Ensure labels exist
    runs-on: ubuntu-latest
    steps:
      - name: Create labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'enhancement', color: 'a2eeef', description: 'New feature or request' },
              { name: 'security', color: 'e4e669', description: 'Security-related change' },
              { name: 'infrastructure', color: 'd93f0b', description: 'Infrastructure and DevOps' },
              { name: 'database', color: '0075ca', description: 'Database schema or migrations' },
              { name: 'backend', color: '5319e7', description: 'Backend API or services' },
              { name: 'frontend', color: 'f9d0c4', description: 'Dashboard / UI changes' },
              { name: 'ui', color: 'fef2c0', description: 'User interface' },
              { name: 'api', color: 'c5def5', description: 'API endpoint changes' },
              { name: 'good first issue', color: '7057ff', description: 'Good for newcomers' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                });
                console.log(`Created label: ${label.name}`);
              } catch (e) {
                if (e.status === 422) {
                  console.log(`Label already exists: ${label.name}`);
                } else {
                  console.error(`Error creating label ${label.name}:`, e.message);
                }
              }
            }

  create-issues:
    name: Create planned issues
    runs-on: ubuntu-latest
    needs: create-labels
    steps:
      - name: Create issues
        uses: actions/github-script@v7
        with:
          script: |
            const dryRun = '${{ github.event.inputs.dry_run }}' === 'true';

            const issues = [
              {
                title: 'feat: Environment model (Prisma schema)',
