            // Fetch existing open issues to avoid duplicates
            const existing = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100,
            });
            const existingTitles = new Set(existing.map(i => i.title));

            for (const [index, issue] of issues.entries()) {
              if (dryRun) {
                const exists = existingTitles.has(issue.title);
                console.log(`[DRY RUN] Issue ${index + 1}: "${issue.title}" — ${exists ? 'ALREADY EXISTS' : 'would create'}`);
                console.log(`  Labels: ${issue.labels.join(', ')}`);
                continue;
              }
              if (existingTitles.has(issue.title)) {
                console.log(`Skipping (already exists): ${issue.title}`);
                continue;
              }
              try {
                const created = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: issue.title,
                  body: issue.body,
                  labels: issue.labels,
                });
                console.log(`Created issue #${created.data.number}: ${issue.title}`);
                console.log(`  URL: ${created.data.html_url}`);
                // Small delay to avoid rate limiting
                await new Promise(r => setTimeout(r, 1000));
              } catch (e) {
                console.error(`Error creating issue ${index + 1} (${issue.title}):`, e.message);
              }
            }
